services:
  relay:
    build: .
    environment:
      PORT: "8080"
      RELAY_HOST: "0.0.0.0"
    ports:
      - "${RELAY_PORT:-18080}:8080"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    profiles: ["tls"]
    depends_on:
      - relay
    ports:
      - "80:80"
      - "443:443"
    environment:
      RELAY_DOMAIN: "${RELAY_DOMAIN}"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
