pre-commit:
  commands:
    bun-lock-guard:
      run: |
        if git diff --cached --name-only --diff-filter=ACMR | grep -E '(^|/)package\.json$' >/dev/null; then
          if ! git diff --cached --name-only --diff-filter=ACMR | grep -q '^bun.lock$'; then
            echo "package.json changed but bun.lock is not staged. Run: bun install"
            exit 1
          fi
        fi
    block-npm-lock:
      run: |
        if git diff --cached --name-only --diff-filter=ACMR | grep -E '(^|/)package-lock\.json$' >/dev/null; then
          echo "package-lock.json is not allowed. Use Bun only."
          exit 1
        fi
