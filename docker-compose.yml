services:
  oisin-ui:
    build: .
    init: true
    ports:
      # - "3000:3000"
      - "6767:6767"
      - "44285:44285"
    environment:
      PASEO_HOME: ${PASEO_HOME:-/config}
      PASEO_PRESTART_CLEAN_LOCK: ${PASEO_PRESTART_CLEAN_LOCK:-0}
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/packages/server/node_modules
      - /workspace/packages/web/node_modules
      - /workspace/packages/cli/node_modules
      - oisin-ui-config:/config
      - ${HOME}/.ssh:/root/.ssh:ro

volumes:
  oisin-ui-config:
